<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/scroll-wrapper.css">
    <link rel="stylesheet" href="css/mobile-carousel.css">
</head>
<body>
    <main>
        <nav class="navbar" role="navigation" aria-label="Primary navigation">
            <div class="navbar__brand">
                <img class="navbar__logo" src="images/logo.png" alt="GitHub Logo">
            </div>
            <a href="#" class="navbar__register-button" role="button">
                <div class="navbar__button-icon">
                    <svg xmlns="http://www.w3.org/2000/svg"
                    fill="none"
                    viewBox="0 0 24 24"
                    stroke-width="1.8"
                    stroke="currentColor"
                    class="navbar__icon-arrow"
                    aria-hidden="true">
                    <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        d="m4.5 19.5 15-15m0 0H8.25m11.25 0v11.25"/>
                    </svg>
                </div>
                <div class="navbar__button-text">
                    REGISTER NOW
                </div>
            </a>
        </nav>
        <div class="home-bg">
            <div class="home-content">
                <div class="left-side">
                    <div class="heading-group">
                        <h1 class="heading heading-line1">Discover Gurugram's</h1>
                        <h1 class="heading heading-line2">Top 30+ schools</h1>
                    </div>
                    <p class="subheading">All In One Place</p>
                    <div class="address-pill-container">
                        <div class="address-content-box">
                            <div class="address-content">
                                <div>
                                    <div class="address-title">Apparel House, </div>
                                    <div class="address-details">sec 44, Gurugram</div>
                                </div>
                                <div class="timing-box">
                                    <div class="address-title">2-3 August 2024, </div>
                                    <div class="address-details">sat-sun 10am-6pm</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="middle-side">
                    <div class="scroll-wrapper">
                        <div class="scroll-col">
                            <div class="col-track track-1">
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="img1">
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="img2">
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="img3">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="img4">
                                <!-- duplicated set for seamless CSS loop -->
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="img1">
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="img2">
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="img3">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="img4">
                            </div>
                        </div>

                        <div class="scroll-col">
                            <div class="col-track track-2">
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="img2">
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="img3">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="img4">
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="img1">
                                <!-- duplicated set for seamless CSS loop -->
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="img2">
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="img3">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="img4">
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="img1">
                            </div>
                        </div>

                        <div class="scroll-col">
                            <div class="col-track track-3">
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="img3">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="img4">
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="img1">
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="img2">
                                <!-- duplicated set for seamless CSS loop -->
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="img3">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="img4">
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="img1">
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="img2">
                            </div>
                        </div>
                    </div>

                    <div class="mobile-carousel-container">
                        <div class="mobile-carousel-track">
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="school1">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="school2">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="school3">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="school4">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(5).png" alt="school5">
                            </div>
                            <!-- duplicated set for seamless CSS loop -->
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(1).png" alt="school1">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(2).png" alt="school2">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(3).png" alt="school3">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(4).png" alt="school4">
                            </div>
                            <div class="mobile-carousel-item">
                                <img src="images/scroll-vertical-images/Mask%20group%20(5).png" alt="school5">
                            </div>
                        </div>
                    </div>

                </div>
                <div class="right-side">
                    <section class="enquiry-form" aria-labelledby="enquiry-title">
                        <div class="enquiry-form__inner">
                            <h2 id="enquiry-title" class="enquiry-form__title">Enquire Now</h2>
                            <form class="enquiry-form__form" action="#" method="post" novalidate>
                                <div class="enquiry-form__field">
                                    <label for="parent-name" class="sr-only">Parent name</label>
                                    <input id="parent-name" name="parent-name" type="text" class="enquiry-form__input" placeholder="Parent name" required aria-required="true">
                                </div>

                                <div class="enquiry-form__field">
                                    <label for="phone" class="sr-only">Phone number</label>
                                    <input id="phone" name="phone" type="tel" pattern="[0-9+\-() ]{7,}" class="enquiry-form__input" placeholder="Phone number" required aria-required="true">
                                </div>

                                <div class="enquiry-form__field">
                                    <label for="grade" class="sr-only">Which grade are you looking for</label>
                                    <input id="grade" name="grade" type="text" class="enquiry-form__input" placeholder="Which grade are you looking for" required aria-required="true">
                                </div>

                                <div class="enquiry-form__actions">
                                    <button type="submit" class="enquiry-form__submit">Submit</button>
                                </div>
                            </form>
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
